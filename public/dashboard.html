<!DOCTYPE html>
<html>

<head>

<title>Admin Dashboard</title>

<link rel="stylesheet" href="admin.css">

</head>

<body>

<div class="container">

<h1>Admin Dashboard</h1>

<div class="cards">

<div class="card">

<h2 id="totalUsers">0</h2>

<p>Total Users</p>

</div>

<div class="card">

<h2 id="totalLogins">0</h2>

<p>Total Logins</p>

</div>

</div>

<h2>Registered Users</h2>

<table>

<thead>

<tr>

<th>Name</th>

<th>Email</th>

<th>Joined</th>

<th>Delete</th>

</tr>

</thead>

<tbody id="userTable">

</tbody>

</table>

<h2>Login History</h2>

<table>

<thead>

<tr>

<th>Name</th>

<th>Email</th>

<th>Login Time</th>

</tr>

</thead>

<tbody id="loginTable">

</tbody>

</table>

</div>

<script src="admin.js"></script>

</body>

</html>
